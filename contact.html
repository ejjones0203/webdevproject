        <nav>
            <ul class="navbar">
                <li><a href="index.html">home</a></li>

                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>

        <div class="maincontent">
            <h1><span class="darkgreen">contact me</span></h1>
        </div>

        <div class="container">
            <form id="form">
                <h3>Feel free to contact me here:</h3>
                <input type="text" id="name" placeholder="name" required minlength="2"><br><br>
                <input type="email" id="email" placeholder="email" required><br><br>
                <textarea id="message" rows = "4" placeholder="message" required minlength="5"></textarea><br><br>
                <div id="successMessage" style="display: none; color: #6B705C;">
                    Your message has been successfully sent! I will get back to you as soon as I can.
                </div>
                <button type="submit">submit</button>
                
            </form>
        </div>
        
        
    </body>

    <script src="form-validation.js"></script>
